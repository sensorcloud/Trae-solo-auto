apiVersion: apps/v1
kind: Deployment
metadata:
  name: edgeagent-hub
  labels:
    app: edgeagent-hub
spec:
  replicas: 3
  selector:
    matchLabels:
      app: edgeagent-hub
  template:
    metadata:
      labels:
        app: edgeagent-hub
    spec:
      containers:
      - name: edgeagent-hub
        image: ywtech/edgeagent-hub:latest
        ports:
        - containerPort: 8080
        env:
        - name: DATABASE_HOST
          valueFrom:
            secretKeyRef:
              name: edgeagent-secrets
              key: db-host
        - name: DATABASE_PORT
          valueFrom:
            secretKeyRef:
              name: edgeagent-secrets
              key: db-port
        - name: DATABASE_NAME
          valueFrom:
            secretKeyRef:
              name: edgeagent-secrets
              key: db-name
        - name: DATABASE_USER
          valueFrom:
            secretKeyRef:
              name: edgeagent-secrets
              key: db-user
        - name: DATABASE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: edgeagent-secrets
              key: db-password
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: edgeagent-secrets
              key: jwt-secret
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        livenessProbe:
          httpGet:
            path: /api/v1/metrics/health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /api/v1/metrics/health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: edgeagent-hub-service
spec:
  type: ClusterIP
  selector:
    app: edgeagent-hub
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8080
---
apiVersion: v1
kind: Secret
metadata:
  name: edgeagent-secrets
type: Opaque
data:
  db-host: cG9zdGdyZXM=
  db-port: NTQzMg==
  db-name: ZWRnZWFnbmV0
  db-user: cG9zdGdyZXM=
  db-password:
  jwt-secret: ZWRnZWFnbmV0LXNlY3JldC1rZXk=