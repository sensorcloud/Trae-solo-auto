apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: edgeagent-hub-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  tls:
  - hosts:
    - api.edgeagent.example.com
    secretName: edgeagent-tls
  rules:
  - host: api.edgeagent.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: edgeagent-hub-service
            port:
              number: 80