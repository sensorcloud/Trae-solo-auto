apiVersion: apps/v1
kind: Deployment
metadata:
  name: edgehub-api
  namespace: edgehub-system
  labels:
    app: edgehub-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: edgehub-api
  template:
    metadata:
      labels:
        app: edgehub-api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: edgehub-api
      containers:
      - name: api
        image: edgehub/api-server:v1.0.0
        imagePullPolicy: Always
        ports:
        - name: http
          containerPort: 8080
          protocol: TCP
        - name: grpc
          containerPort: 9090
          protocol: TCP
        env:
        - name: DB_HOST
          valueFrom:
            configMapKeyRef:
              name: edgehub-config
              key: database.host
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: edgehub-secrets
              key: db-password
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: edgehub-secrets
              key: jwt-secret
        resources:
          requests:
            cpu: 500m
            memory: 512Mi
          limits:
            cpu: 2000m
            memory: 2Gi
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 5
          periodSeconds: 5
        volumeMounts:
        - name: config
          mountPath: /etc/edgehub
          readOnly: true
      volumes:
      - name: config
        configMap:
          name: edgehub-config
---
apiVersion: v1
kind: Service
metadata:
  name: edgehub-api
  namespace: edgehub-system
  labels:
    app: edgehub-api
spec:
  type: ClusterIP
  ports:
  - name: http
    port: 80
    targetPort: http
    protocol: TCP
  - name: grpc
    port: 9090
    targetPort: grpc
    protocol: TCP
  selector:
    app: edgehub-api
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: edgehub-scheduler
  namespace: edgehub-system
  labels:
    app: edgehub-scheduler
spec:
  replicas: 2
  selector:
    matchLabels:
      app: edgehub-scheduler
  template:
    metadata:
      labels:
        app: edgehub-scheduler
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
    spec:
      serviceAccountName: edgehub-api
      containers:
      - name: scheduler
        image: edgehub/scheduler:v1.0.0
        imagePullPolicy: Always
        ports:
        - name: metrics
          containerPort: 9090
          protocol: TCP
        resources:
          requests:
            cpu: 500m
            memory: 512Mi
          limits:
            cpu: 2000m
            memory: 2Gi
        volumeMounts:
        - name: config
          mountPath: /etc/edgehub
          readOnly: true
      volumes:
      - name: config
        configMap:
          name: edgehub-config
---
apiVersion: v1
kind: Service
metadata:
  name: edgehub-scheduler
  namespace: edgehub-system
  labels:
    app: edgehub-scheduler
spec:
  type: ClusterIP
  ports:
  - name: metrics
    port: 9090
    targetPort: metrics
    protocol: TCP
  selector:
    app: edgehub-scheduler
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: edgehub-node-agent
  namespace: edgehub-system
  labels:
    app: edgehub-node-agent
spec:
  selector:
    matchLabels:
      app: edgehub-node-agent
  template:
    metadata:
      labels:
        app: edgehub-node-agent
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9100"
    spec:
      serviceAccountName: edgehub-api
      hostNetwork: true
      hostPID: true
      containers:
      - name: node-agent
        image: edgehub/node-agent:v1.0.0
        imagePullPolicy: Always
        securityContext:
          privileged: true
        ports:
        - name: metrics
          containerPort: 9100
          hostPort: 9100
          protocol: TCP
        env:
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        - name: EDGEHUB_SERVER
          value: "edgehub-api.edgehub-system.svc:8080"
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        volumeMounts:
        - name: docker-socket
          mountPath: /var/run/docker.sock
        - name: kubelet-socket
          mountPath: /var/lib/kubelet
        - name: sys
          mountPath: /sys
        - name: config
          mountPath: /etc/edgehub
          readOnly: true
      volumes:
      - name: docker-socket
        hostPath:
          path: /var/run/docker.sock
      - name: kubelet-socket
        hostPath:
          path: /var/lib/kubelet
      - name: sys
        hostPath:
          path: /sys
      - name: config
        configMap:
          name: edgehub-config
